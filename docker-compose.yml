services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: gitmastery-postgres
    ports:
      # High port avoids clash with local Postgres on 5432 and other tools on 5433.
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gitmastery"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
